schema_version = 1

[[case]]
reader = "aperio"
area = "svs-baseline"
requirement = "Representative SVS fixture has metadata, pixel, speed, and RSS parity."
status = "covered"
fixtures = ["aperio-local-77917"]
notes = "Representative local SVS fixture is exact; public small-region SVS is tracked as a separate exact public JPEG/RGB case."

[[case]]
reader = "aperio"
area = "public-jpeg-rgb"
requirement = "Public RGB-tagged JPEG SVS variants have exact or documented parity."
status = "covered"
fixtures = ["aperio-public-cmu-1-small-region"]
notes = "Public small-region SVS now has exact sampled checksum parity after forcing TIFF JPEG tiles to honor the RGB photometric colorspace."

[[case]]
reader = "aperio"
area = "codec-layout-breadth"
requirement = "Raw, JPEG, JPEG 2000, TIFF layout variants, and libtiff-divergent unsupported cases are fixture-backed."
status = "pending"
fixtures = []
notes = "Need broader SVS fixtures that isolate raw/JPEG/JPEG2000, planar/contiguous, tiled/stripped, edge-tile, and unsupported layout behavior."

[[case]]
reader = "aperio"
area = "metadata-associated-images"
requirement = "Aperio associated images, ICC/quickhash behavior, and ImageDescription variants are covered by fixtures."
status = "pending"
fixtures = []
notes = "Need fixtures for macro/label/thumbnail names, ICC/profile export, quickhash, and metadata formatting variants before moving beyond fixture-verified."

[[case]]
reader = "hamamatsu-ndpi"
area = "cmu-1"
requirement = "Private and public CMU-1 NDPI fixtures are exact with speed/RSS baselines."
status = "covered"
fixtures = ["hamamatsu-ndpi-local-cmu-1", "hamamatsu-ndpi-public-cmu-1"]

[[case]]
reader = "hamamatsu-ndpi"
area = "dnl-zero-dimension-jpeg"
